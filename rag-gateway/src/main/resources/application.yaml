server:
  port: 8080

spring:
  main:
    web-application-type: reactive
  application:
    name: rag-gateway
  ai:
    openai:
      api-key: sk-dummy-key-for-gateway-startup-ignore-this
  cloud:
    nacos:
      discovery:
        server-addr: 192.168.1.137:8848
        username: nacos
        password: nacos
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true

          globalcors:
            add-to-simple-url-handler-mapping: true
            cors-configurations:
              '[/**]':
                allowed-origin-patterns: "*"
                allowed-methods: "*"
                allowed-headers: "*"
                allow-credentials: true
                max-age: 360000

          routes:
            - id: file_route
              uri:  lb://rag-file
              predicates:
                - Path=/admin/file/**
#              filters:
#                - args:
            - id: chat_route
              uri: lb://rag-chat
              predicates:
                - Path=/admin/ai/**

            - id: kafka-provider-route
              uri: lb://kafka-provider
              predicates:
                - Path=/admin/kafka/**



